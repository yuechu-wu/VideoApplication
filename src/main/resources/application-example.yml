server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 这里的 bilibili_clone 是我们之前建的数据库名，如果你用了别的名字请修改
    url: jdbc:mysql://localhost:3306/bilibili_clone?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: 你的数据库账号
    password: 你的数据库密码

# 阿里云 OSS 配置 (替换成你自己的)
aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com # 替换为你 Bucket 所在的地域节点
    accessKeyId: 你的AccessKeyID
    accessKeySecret: 你的AccessKeySecret
    bucketName: 你的Bucket名称